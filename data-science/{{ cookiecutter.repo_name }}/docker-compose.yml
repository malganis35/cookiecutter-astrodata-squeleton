services:
  api:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile
    container_name: {{ cookiecutter.repo_name }}-api
    ports:
      - "8000:8000"
    command: uvicorn {{ cookiecutter.package_name }}.api.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - {{ cookiecutter.repo_name }}-network
    restart: on-failure
    develop:
      watch:
        - action: sync
          path: ./src
          target: /app/src
        - action: sync
          path: ./pyproject.toml
          target: /app/pyproject.toml
        - action: rebuild
          path: ./dockerfiles/Dockerfile

  streamlit:
    build:
      context: .
      dockerfile: dockerfiles/Dockerfile
    container_name: {{ cookiecutter.repo_name }}-ui
    ports:
      - "8501:8501"
    command: uv run streamlit run app/streamlit_app.py --server.port=8501 --server.address=0.0.0.0
    networks:
      - {{ cookiecutter.repo_name }}-network
    restart: on-failure
    depends_on:
      - api

networks:
  {{ cookiecutter.repo_name }}-network:
    driver: bridge
    name: {{ cookiecutter.repo_name }}-network